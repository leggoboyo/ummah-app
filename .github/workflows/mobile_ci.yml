name: Mobile CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: mobile-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-and-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Enforce formatting
        run: dart format --set-exit-if-changed .

      - name: Enforce feature boundaries
        run: python3 scripts/check_feature_boundaries.py

      - name: Block tracked secret-like files
        run: python3 scripts/check_tracked_secret_files.py

      - name: Validate canonical pack manifests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 scripts/validate_packs.py \
              --check-version-bumps \
              --base-ref "origin/${{ github.base_ref }}"
          else
            python3 scripts/validate_packs.py
          fi

      - name: Regenerate source docs and catalog
        run: |
          python3 scripts/generate_sources_site.py
          git diff --exit-code -- docs/sources mobile/app/assets/generated/source_catalog.json

      - name: Install Worker dependencies
        working-directory: services/content-pack-worker
        run: npm ci

      - name: Run Worker tests
        working-directory: services/content-pack-worker
        run: node --test

      - name: Audit Worker dependencies
        working-directory: services/content-pack-worker
        run: npm audit --omit=dev --audit-level=high

  analyze-and-test:
    runs-on: macos-latest
    needs: format-and-worker
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Analyze
        run: dart run melos exec -c 1 -- flutter analyze

      - name: Test
        run: dart run melos exec -c 1 --dir-exists=test -- flutter test

  build-android:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build Android App Bundle
        working-directory: mobile/app
        run: flutter build appbundle --dart-define-from-file=env/staging.json

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build iOS archive
        working-directory: mobile/app
        run: flutter build ipa --no-codesign --dart-define-from-file=env/staging.json
