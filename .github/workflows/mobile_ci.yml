name: Mobile CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: mobile-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format-and-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Enforce formatting
        run: dart format --set-exit-if-changed .

      - name: Install Worker dependencies
        working-directory: services/content-pack-worker
        run: npm ci

      - name: Run Worker tests
        working-directory: services/content-pack-worker
        run: node --test

      - name: Audit Worker dependencies
        working-directory: services/content-pack-worker
        run: npm audit --omit=dev --audit-level=high

  analyze-and-test:
    runs-on: macos-latest
    needs: format-and-worker
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Analyze
        run: dart run melos exec -c 1 -- flutter analyze

      - name: Test
        run: dart run melos exec -c 1 --dir-exists=test -- flutter test

  build-android:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build Android App Bundle
        working-directory: mobile/app
        run: flutter build appbundle --dart-define-from-file=env/staging.json

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Activate Melos
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build iOS archive
        working-directory: mobile/app
        run: flutter build ipa --no-codesign --dart-define-from-file=env/staging.json
