name: Build Size Report

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-size-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-build-size:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace
        run: |
          dart pub get
          dart run melos bootstrap

      - name: Build Android release artifacts
        working-directory: mobile/app
        run: |
          flutter build apk --release --dart-define-from-file=env/staging.json
          flutter build apk --release --split-per-abi --dart-define-from-file=env/staging.json
          flutter build appbundle --dart-define-from-file=env/staging.json

      - name: Report build sizes
        env:
          MAX_AAB_BYTES: 60000000
          MAX_ARMV7_APK_BYTES: 32000000
          MAX_ARM64_APK_BYTES: 32000000
        run: ./scripts/report_build_sizes.sh

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: build-size-report
          path: build/build-size-report.md
