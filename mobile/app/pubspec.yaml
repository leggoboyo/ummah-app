name: ummah_mobile_app
description: Flutter app shell for the privacy-first Ummah App.
publish_to: none
version: 0.4.1+7

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  core:
    path: ../../packages/core
  prayer:
    path: ../../features/prayer
  qibla:
    path: ../../features/qibla
  quran:
    path: ../../features/quran
  hadith:
    path: ../../features/hadith
  fiqh:
    path: ../../features/fiqh
  scholar_feed:
    path: ../../features/scholar_feed
  ai_assistant:
    path: ../../features/ai_assistant
  subscriptions:
    path: ../../features/subscriptions
  shared_preferences: ^2.5.4
  geolocator: ^14.0.2
  flutter_local_notifications: ^21.0.0
  flutter_secure_storage: ^10.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  url_launcher: ^6.3.2
  purchases_flutter: ^9.14.0
  flutter_compass: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
